<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <title>Proyecto Interactivo - A-Frame</title>
  </head>
  <body>
    <a-scene>
      <a-sky color="#ECECEC"></a-sky>
      <a-light type="ambient" intensity="0.5"></a-light>
      
      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor fuse="true" fuse-timeout="1500" color="yellow"></a-cursor>
      </a-entity>

      <a-box id="caja-interactiva" 
             position="0 1 -3" 
             rotation="0 45 0" 
             color="#4CC3D9"
             animation__click="property: scale; from: 1 1 1; to: 1.2 1.2 1.2; dur: 300; startEvents: click">
      </a-box>

      <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>
    </a-scene>

    <script>
      // Lógica simple en Vanilla JS
      const box = document.querySelector('#caja-interactiva');
      box.addEventListener('click', () => {
        console.log('¡Interactuaste con el objeto!');
        // Aquí podrías disparar un evento de juego
      });
    </script>
  </body>
</html>
