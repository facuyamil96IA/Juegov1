<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo Cero</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #d2b48c; /* Color Oak */
            --bg: #0d0d0d;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Estética Glassmorphism */
        #game-container {
            width: 90%;
            max-width: 400px;
            padding: 2rem;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            min-height: 120px;
        }

        .options-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .options-btn:active {
            background: var(--accent);
            color: var(--bg);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats">
        <div>Energía: <span id="energy">100</span>%</div>
        <div>Oxígeno: <span id="oxigen">100</span>%</div>
    </div>
    
    <div id="text">Cargando sistema...</div>
    <div id="options"></div>
</div>

<script>
    let state = { energy: 100, oxigen: 100 };

    const storyNodes = [
        {
            id: 1,
            text: "Día 1: Una tormenta electromagnética golpea el búnker. Las luces parpadean. El generador principal falla.",
            options: [
                {
                    text: "Forzar generador (Gasta energía)",
                    nextText: 2,
                    setState: { energy: -20 }
                },
                {
                    text: "Cortar ventilación (Ahorra energía, gasta oxígeno)",
                    nextText: 3,
                    setState: { oxigen: -30 }
                }
            ]
        },
        {
            id: 2,
            text: "El generador ruge y se estabiliza, pero el calor aumenta. Escuchas golpes en la escotilla exterior.",
            options: [
                { text: "Abrir escotilla", nextText: 4 },
                { text: "Ignorar y asegurar sellos", nextText: 5 }
            ]
        },
        {
            id: 3,
            text: "El silencio es absoluto. El aire se vuelve pesado. De repente, una alarma roja se activa: fuga en el sector B.",
            options: [
                { text: "Reparar solo", nextText: 5 },
                { text: "Enviar dron (Gasta energía)", nextText: 6, setState: { energy: -10 } }
            ]
        }
        // Aquí irán más nodos...
    ];

    function startGame() {
        showTextNode(1);
    }

    function showTextNode(textNodeIndex) {
        const textNode = storyNodes.find(node => node.id === textNodeIndex);
        document.getElementById('text').innerText = textNode.text;
        
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';

        textNode.options.forEach(option => {
            const button = document.createElement('button');
            button.innerText = option.text;
            button.classList.add('options-btn');
            button.addEventListener('click', () => selectOption(option));
            optionsContainer.appendChild(button);
        });

        updateUI();
    }

    function selectOption(option) {
        if (option.setState) {
            state.energy += option.setState.energy || 0;
            state.oxigen += option.setState.oxigen || 0;
        }
        
        if (state.energy <= 0 || state.oxigen <= 0) {
            alert("SISTEMA CRÍTICO: Has muerto.");
            location.reload();
            return;
        }

        showTextNode(option.nextText);
    }

    function updateUI() {
        document.getElementById('energy').innerText = state.energy;
        document.getElementById('oxigen').innerText = state.oxigen;
    }

    startGame();
</script>

</body>
</html>
