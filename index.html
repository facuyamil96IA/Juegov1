<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    <style>
      #joystick-zone {
        position: absolute;
        bottom: 50px;
        left: 50px;
        width: 120px;
        height: 120px;
        z-index: 10;
        touch-action: none;
        opacity: 0.6;
      }
      /* Viñeta para dar profundidad visual */
      .vignette {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        box-shadow: inset 0 0 150px rgba(0,0,0,0.3);
        pointer-events: none;
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <div class="vignette"></div>
    <div id="joystick-zone"></div>

    <a-scene fog="type: exponential; color: #e8e4de; density: 0.08" renderer="colorManagement: true; antialias: true;">
      
      <a-assets>
        <img id="grain" src="https://www.transparenttextures.com/patterns/white-sand.png">
      </a-assets>

      <a-entity id="rig" position="0 0 12">
        <a-entity id="camera" camera look-controls position="0 1.6 0">
          <a-cursor color="#5d4037" scale="0.3 0.3 0.3"></a-cursor>
        </a-entity>
      </a-entity>

      <a-light type="ambient" color="#fff" intensity="0.4"></a-light>
      <a-light type="directional" color="#ffd1a3" intensity="1.2" position="2 10 5" castShadow="true"></a-light>

      <a-box position="0 -0.5 -5" width="20" height="1" depth="30" color="#f7f3f0" material="src: #grain; repeat: 10 10"></a-box>

      <a-entity id="columnas" position="0 0 -5">
        <a-box position="-6 4 -10" width="0.4" height="8" depth="0.4" color="#dccfbe"></a-box>
        <a-box position="-6 4 -5" width="0.4" height="8" depth="0.4" color="#dccfbe"></a-box>
        <a-box position="-6 4 0" width="0.4" height="8" depth="0.4" color="#dccfbe"></a-box>
        <a-box position="-6 4 5" width="0.4" height="8" depth="0.4" color="#dccfbe"></a-box>
        
        <a-box position="6 4 -10" width="0.4" height="8" depth="0.4" color="#dccfbe"></a-box>
        <a-box position="6 4 -5" width="0.4" height="8" depth="0.4" color="#dccfbe"></a-box>
        <a-box position="6 4 0" width="0.4" height="8" depth="0.4" color="#dccfbe"></a-box>
        <a-box position="6 4 5" width="0.4" height="8" depth="0.4" color="#dccfbe"></a-box>
      </a-entity>

      <a-entity id="roof" position="0 8 -5">
        <a-box position="-4 0 0" width="5" height="0.2" depth="25" color="#fff"></a-box>
        <a-box position="4 0 0" width="5" height="0.2" depth="25" color="#fff"></a-box>
        <a-box position="0 0 -10" width="3" height="0.2" depth="5" color="#fff"></a-box>
        <a-box position="0 0 10" width="3" height="0.2" depth="5" color="#fff"></a-box>
      </a-entity>

      <a-box position="0 1.2 -15" width="2" height="2" depth="2" 
             material="color: #ffffff; opacity: 0.15; transparent: true; metalness: 0.6; roughness: 0"
             animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
      </a-box>

      <a-sky color="#e8e4de"></a-sky>
    </a-scene>

    <script>
      const rig = document.querySelector('#rig');
      const camera = document.querySelector('#camera');
      let moveForward = 0;
      let moveSideways = 0;

      // Configuración del Joystick
      const manager = nipplejs.create({
        zone: document.getElementById('joystick-zone'),
        mode: 'static',
        position: { left: '60px', bottom: '60px' },
        color: '#5d4037',
        size: 100
      });

      manager.on('move', (evt, data) => {
        if (data.angle) {
          const force = data.force > 1 ? 1 : data.force;
          const angle = data.angle.radian;
          
          // CORRECCIÓN: Invertimos los senos/cosenos para que el movimiento sea natural
          moveForward = Math.sin(angle) * force * 0.18; 
          moveSideways = -Math.cos(angle) * force * 0.18;
        }
      });

      manager.on('end', () => {
        moveForward = 0;
        moveSideways = 0;
      });

      function tick() {
        if (moveForward !== 0 || moveSideways !== 0) {
          const rotation = camera.getAttribute('rotation');
          // Convertimos grados a radianes
          const angleY = rotation.y * (Math.PI / 180);

          const pos = rig.getAttribute('position');
          
          // Lógica de movimiento corregida respecto a la vista de cámara
          const deltaX = moveForward * Math.sin(angleY) + moveSideways * Math.cos(angleY);
          const deltaZ = moveForward * Math.cos(angleY) - moveSideways * Math.sin(angleY);

          rig.setAttribute('position', { 
            x: pos.x + deltaX, 
            y: pos.y, 
            z: pos.z - deltaZ // El eje Z es negativo hacia adelante en A-Frame
          });
        }
        requestAnimationFrame(tick);
      }
      tick();
    </script>
  </body>
</html>
