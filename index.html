<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    <style>
      /* Estilo del contenedor del joystick */
      #joystick-zone {
        position: absolute;
        bottom: 40px;
        left: 40px;
        width: 120px;
        height: 120px;
        z-index: 10;
        /* Evita que el navegador intente hacer scroll al tocar */
        touch-action: none; 
      }
    </style>
  </head>
  <body>
    <div id="joystick-zone"></div>

    <a-scene fog="type: exponential; color: #e5e0d8; density: 0.12" renderer="antialias: true; colorManagement: true;">
      
      <a-entity id="rig" position="0 0 8">
        <a-entity id="camera" camera look-controls position="0 1.6 0">
          <a-cursor color="#5d4037" scale="0.5 0.5 0.5"></a-cursor>
        </a-entity>
      </a-entity>

      <a-light type="ambient" color="#fff" intensity="0.5"></a-light>
      <a-light type="directional" color="#ffd1a3" intensity="0.8" position="5 10 5" castShadow="true"></a-light>

      <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#f2efed"></a-plane>

      <a-entity position="0 0 -5">
        <a-box position="0 -0.05 0" width="10" depth="15" height="0.1" color="#dccfbe"></a-box>
        <a-box position="-4 3 -6" width="0.25" height="6" depth="0.25" color="#5d4037"></a-box>
        <a-box position="4 3 -6" width="0.25" height="6" depth="0.25" color="#5d4037"></a-box>
        <a-box position="-4 3 0" width="0.25" height="6" depth="0.25" color="#5d4037"></a-box>
        <a-box position="4 3 0" width="0.25" height="6" depth="0.25" color="#5d4037"></a-box>
        <a-box position="0 6 -3" width="8.5" height="0.1" depth="8" color="#fff"></a-box>
      </a-entity>

      <a-box position="0 0.8 -9" width="1.2" height="1.2" depth="1.2" 
             material="color: #ffffff; opacity: 0.3; transparent: true; metalness: 0.5; roughness: 0"
             animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
      </a-box>

    </a-scene>

    <script>
      // CONFIGURACIÓN DEL JOYSTICK
      const rig = document.querySelector('#rig');
      const camera = document.querySelector('#camera');
      let moveForward = 0;
      let moveSideways = 0;

      const manager = nipplejs.create({
        zone: document.getElementById('joystick-zone'),
        mode: 'static',
        position: { left: '60px', bottom: '60px' },
        color: '#5d4037',
        size: 100
      });

      manager.on('move', (evt, data) => {
        if (data.angle) {
          // Calculamos la fuerza y el ángulo
          const force = data.force > 1 ? 1 : data.force;
          const angle = data.angle.radian;
          
          // Traducimos el ángulo del joystick al movimiento local
          moveForward = -Math.sin(angle) * force * 0.15;
          moveSideways = Math.cos(angle) * force * 0.15;
        }
      });

      manager.on('end', () => {
        moveForward = 0;
        moveSideways = 0;
      });

      // LOOP DE MOVIMIENTO (60fps)
      function tick() {
        if (moveForward !== 0 || moveSideways !== 0) {
          // Obtenemos la rotación actual de la cámara para movernos en la dirección que miramos
          const rotation = camera.getAttribute('rotation');
          const angle = rotation.y * (Math.PI / 180);

          const pos = rig.getAttribute('position');
          
          // Cálculo de movimiento relativo a donde mira el usuario
          const newX = pos.x + moveForward * Math.sin(angle) + moveSideways * Math.cos(angle);
          const newZ = pos.z + moveForward * Math.cos(angle) - moveSideways * Math.sin(angle);

          rig.setAttribute('position', { x: newX, y: pos.y, z: newZ });
        }
        requestAnimationFrame(tick);
      }
      tick();
    </script>
  </body>
</html>
