<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Templo Minimalista VR - Mobile</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
  </head>
  <body>
    <a-scene shadow="type: pcfsoft">
      <a-assets>
        <img id="floor-texture" src="https://cdn.pixabay.com/photo/2016/12/26/13/50/marble-1932174_1280.jpg">
      </a-assets>

      <a-entity id="rig" position="0 0 5">
        <a-entity camera look-controls wasd-controls position="0 1.6 0">
          <a-cursor 
            id="cursor"
            animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
            color="#C0C0C0"
            raycaster="objects: .nav-point, .interactable">
          </a-cursor>
        </a-entity>
      </a-entity>

      <a-sky color="#f4f4f4"></a-sky>
      <a-light type="ambient" intensity="0.7"></a-light>
      <a-light type="directional" position="-1 4 2" intensity="0.5" castShadow="true"></a-light>

      <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" 
               src="#floor-texture" repeat="10 10" color="#fafafa" shadow="receive: true"></a-plane>

      <a-entity id="columns">
        <a-box position="-4 2 -5" width="0.8" height="4" depth="0.8" color="#d2b48c" shadow></a-box>
        <a-box position="-4 2 0" width="0.8" height="4" depth="0.8" color="#d2b48c" shadow></a-box>
        <a-box position="4 2 -5" width="0.8" height="4" depth="0.8" color="#d2b48c" shadow></a-box>
        <a-box position="4 2 0" width="0.8" height="4" depth="0.8" color="#d2b48c" shadow></a-box>
      </a-entity>

      <a-box position="0 0.5 -7" width="2" height="1" depth="2" 
             material="color: #ffffff; opacity: 0.4; transparent: true; metalness: 0.1; roughness: 0.1" 
             shadow>
      </a-box>

      <a-circle class="nav-point" position="0 0.05 -3" rotation="-90 0 0" radius="0.3" color="#C0C0C0"
                event-set__click="_target: #rig; position: 0 0 -3"></a-circle>
      
      <a-circle class="nav-point" position="0 0.05 -8" rotation="-90 0 0" radius="0.3" color="#C0C0C0"
                event-set__click="_target: #rig; position: 0 0 -8"></a-circle>

      <a-circle class="nav-point" position="5 0.05 0" rotation="-90 0 0" radius="0.3" color="#C0C0C0"
                event-set__click="_target: #rig; position: 5 0 0"></a-circle>

    </a-scene>

    <script>
      // Lógica opcional para detectar clics en el altar
      const altar = document.querySelector('a-box[position="0 0.5 -7"]');
      altar.addEventListener('click', () => {
        alert('Has encontrado el centro del templo.');
      });
    </script>
  </body>
</html>
